global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9100']
      
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['ipbd_cadvisor:8080'] # REVISI: Menggunakan DNS kontainer spesifik
  
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']